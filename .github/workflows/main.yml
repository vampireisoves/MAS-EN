name: 自动同步上游仓库

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  actions: write

on:
  workflow_dispatch:
  schedule:
    # - cron: '*/15 * * * *'      # 15分钟
    # - cron: '0 */6 * * *'        # 6小时
    # - cron: '0 */12 * * *'       # 12小时
    - cron: '0 0 * * *'            # 24小时

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 关联上游
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/massgravel/Microsoft-Activation-Scripts.git
          git fetch upstream

      - name: 配置Git身份
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 检查更新
        id: check
        run: |
          git checkout master
          LOCAL=$(git rev-parse master)
          UPSTREAM=$(git rev-parse upstream/master)
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: 合并并推送
        if: ${{ steps.check.outputs.has_update == 'true' }}
        run: |
          git merge upstream/master --no-edit --allow-unrelated-histories
          git push origin master

  del_runs:
    needs: sync-upstream
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 删除旧记录，保留最近4条
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 4
